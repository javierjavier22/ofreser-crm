<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ofreser Chat Pro</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
}

:root{
  --bg:#071019;
  --panel:#101922;
  --panel-2:#17232d;
  --line:#243443;
  --text:#eaf2f7;
  --muted:#9db0bf;
  --green:#18b45b;
  --green-2:#14964c;
  --user:#0b6b57;
  --bot:#1f2c36;
  --chip:#21303b;
  --chip-hover:#2c3c48;
  --shadow:0 24px 70px rgba(0,0,0,.45);
}

body{
  background:
    radial-gradient(circle at top, rgba(24,180,91,.08) 0%, transparent 22%),
    linear-gradient(180deg, #061018 0%, #0a141c 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:18px;
  color:var(--text);
}

.app{
  width:100%;
  max-width:440px;
  height:min(92vh, 860px);
  background:linear-gradient(180deg, #0f171f 0%, #111b21 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
}

.header{
  background:linear-gradient(180deg, #1a2731 0%, #1f2d37 100%);
  border-bottom:1px solid rgba(255,255,255,.06);
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(180deg, var(--green) 0%, var(--green-2) 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:white;
  font-size:18px;
  box-shadow:0 8px 24px rgba(24,180,91,.25);
  flex-shrink:0;
}

.header-text{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.header-title{
  color:#fff;
  font-weight:800;
  font-size:15px;
  line-height:1.2;
}

.header-sub{
  color:var(--muted);
  font-size:12px;
  margin-top:2px;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:18px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.015) 0%, rgba(255,255,255,0) 100%);
}

.chat::-webkit-scrollbar{
  width:8px;
}

.chat::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.08);
  border-radius:999px;
}

.msg{
  max-width:82%;
  padding:11px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.45;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  word-break:break-word;
}

.bot{
  background:var(--bot);
  color:var(--text);
  align-self:flex-start;
  border-top-left-radius:6px;
  border:1px solid rgba(255,255,255,.05);
}

.user{
  background:var(--user);
  color:#fff;
  align-self:flex-end;
  border-top-right-radius:6px;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:12px;
}

.chip{
  background:var(--chip);
  color:var(--text);
  padding:7px 11px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.08);
  transition:.16s ease;
  user-select:none;
}

.chip:hover{
  background:var(--chip-hover);
  transform:translateY(-1px);
}

.composer{
  display:flex;
  align-items:center;
  padding:12px;
  background:linear-gradient(180deg, #1b2730 0%, #202c33 100%);
  gap:10px;
  border-top:1px solid rgba(255,255,255,.06);
}

.composer input{
  flex:1;
  padding:12px 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.06);
  outline:none;
  background:#2a3942;
  color:white;
  font-size:14px;
}

.composer input::placeholder{
  color:#9fb0bc;
}

.composer input:focus{
  border-color:rgba(24,180,91,.45);
  box-shadow:0 0 0 3px rgba(24,180,91,.10);
}

.send{
  width:44px;
  height:44px;
  background:linear-gradient(180deg, var(--green) 0%, var(--green-2) 100%);
  border:none;
  border-radius:50%;
  cursor:pointer;
  color:#fff;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 24px rgba(24,180,91,.22);
  transition:.16s ease;
  flex-shrink:0;
}

.send:hover{
  transform:translateY(-1px);
}

.typing{
  font-size:12px;
  color:var(--muted);
  margin-left:4px;
}

@media (max-width: 520px){
  body{
    padding:0;
  }

  .app{
    max-width:none;
    height:100vh;
    border-radius:0;
    border:none;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="logo">O</div>
    <div class="header-text">
      <div class="header-title">Ofreser</div>
      <div class="header-sub">Asistente virtual · Atención inicial</div>
    </div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="composer">
    <input id="input" placeholder="Escribí tu consulta..." />
    <button class="send" id="sendBtn">➤</button>
  </div>

</div>

<script>
const API_URL = 'http://localhost:3000/chat';
const SESSION_KEY = 'ofreser_chat_session_id';

let sessionId = sessionStorage.getItem(SESSION_KEY);
if (!sessionId) {
  sessionId = 'cliente_' + Date.now();
  sessionStorage.setItem(SESSION_KEY, sessionId);
}

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function scrollBottom(){
  chat.scrollTop = chat.scrollHeight;
}

function addUser(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerText = text;
  chat.appendChild(div);
  scrollBottom();
}

function addBot(reply){
  const div = document.createElement('div');
  div.className = 'msg bot';

  let html = reply.message || '';

  if(reply.options && reply.options.length){
    html += `<div class="chips">`;

    reply.options.forEach(o=>{
      html += `<div class="chip" data-value="${o.value}">${o.label}</div>`;
    });

    html += `</div>`;
  }

  div.innerHTML = html;
  chat.appendChild(div);
  scrollBottom();

  div.querySelectorAll('.chip').forEach(c=>{
    c.onclick = ()=>{
      addUser(c.innerText);
      sendMessage(c.dataset.value,false);
    };
  });
}

function typing(){
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerText = 'Escribiendo...';
  chat.appendChild(div);
  scrollBottom();
  return div;
}

async function sendMessage(msg,show=true){
  if(!msg.trim()) return;

  if(show) addUser(msg);

  const t = typing();

  try{
    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sessionId,message:msg})
    });

    const data = await res.json();

    t.remove();

    addBot(data.reply);

  }catch(e){
    t.remove();
    console.error(e);
  }
}

function send(){
  const text = input.value;
  input.value='';
  sendMessage(text,true);
}

sendBtn.onclick = send;

input.addEventListener('keypress',e=>{
  if(e.key==='Enter') send();
});

sendMessage('hola',false);
</script>

</body>
</html>
